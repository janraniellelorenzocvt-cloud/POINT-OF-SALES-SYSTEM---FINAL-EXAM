<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vine Crawler | Botany Restaurant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a3c2a 0%, #0a140f 100%);
            padding-top: 100px; 
            box-sizing: border-box; 
        }

        .game-header { text-align: center; margin-bottom: 15px; }

        #gameCanvas {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-green);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
            backdrop-filter: blur(5px);
        }

        .game-legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px;
        }

        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #fff; }
        .legend-icon { font-size: 1.2rem; width: 25px; text-align: center; }

        .score-board { font-size: 1.8rem; font-weight: 600; color: var(--accent-green); }
        .restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--accent-green);
            border: none;
            border-radius: 50px;
            color: var(--forest-bg);
            font-weight: 600;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">BOTANY GAME</div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Home</a></li>
        </ul>
    </nav>

    <div class="game-container">
        <div class="game-header">
            <h1>Vine Crawler</h1>
            <p>Guide the vine through the forest.</p>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="game-legend">
            <div class="legend-item"><span class="legend-icon">🥗</span> <span><b>Salad:</b> +1 Point</span></div>
            <div class="legend-item"><span class="legend-icon">🪵</span> <span><b>Log:</b> Game Over</span></div>
            <div class="legend-item"><span class="legend-icon">🫐</span> <span><b>Blueberry:</b> Slows (20s)</span></div>
            <div class="legend-item"><span class="legend-icon">🌶️</span> <span><b>Chili:</b> Speeds Up (20s)</span></div>
            <div class="legend-item"><span class="legend-icon">🍄</span> <span><b>Mushroom:</b> +5 Pts + Chili Burst</span></div>
            <div class="legend-item" style="color: var(--text-dim); font-style: italic;">Special foods despawn in 10s!</div>
        </div>

        <div class="score-board">Score: <span id="score">0</span></div>
        <button id="restartBtn" class="restart-btn" onclick="resetGame()">Try Again</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
