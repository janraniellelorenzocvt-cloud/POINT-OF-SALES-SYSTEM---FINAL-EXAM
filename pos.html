<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botany POS | Staff Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Top popup alert notification styling */
        .toast-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast-notification.show { top: 30px; }
        .toast-success { background: #2ecc71; color: #0a140f; border: 1px solid rgba(255,255,255,0.2); }
        .toast-error { background: #e74c3c; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        .pos-container {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 30px;
            padding: 110px 4% 40px;
            height: 100vh;
            max-width: 1800px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .menu-panel-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 150px);
        }

        .menu-selection-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Bootstrap Video Layout Match for Cards */
        .pos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .pos-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }
        .pos-card:hover { border-color: rgba(46, 204, 113, 0.4); }

        .pos-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .pos-card-info { flex-grow: 1; text-align: left; }
        .pos-item-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .pos-item-price { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 15px; }

        /* Inline Input/Action Row Match */
        .pos-card-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .pos-qty-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
            font-weight: 600;
        }
        .pos-qty-field:focus { border-color: var(--accent-green); outline: none; }

        .card-add-btn {
            width: 100%;
            padding: 10px;
            background: #2ecc71; 
            color: #fff;
            border: none;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .card-add-btn:hover { opacity: 0.9; }

        /* Checkout Container Setup */
        .ordered-items-sidebar {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            height: calc(100vh - 150px);
            box-sizing: border-box;
        }

        .sidebar-title { font-size: 1.5rem; font-weight: 600; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .order-list-scroll {
            flex-grow: 1;
            overflow-y: auto;
            margin: 15px 0;
            padding-right: 5px;
        }

        /* Selected Layout Block */
        .receipt-row-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .receipt-item-name { font-size: 1rem; font-weight: 600; color: #fff; }
        .receipt-item-qty { font-size: 0.85rem; color: var(--accent-green); margin-top: 4px; display: block; }

        .calculation-footer-box {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .grand-total-label { font-size: 1.5rem; font-weight: 600; margin-bottom: 15px; color: #fff; }

        .payment-input-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cash-text-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 14px;
            border-radius: 8px;
            color: #fff;
            font-size: 1.05rem;
            box-sizing: border-box;
        }
        .cash-text-input:focus { border-color: var(--accent-green); outline: none; }

        .action-pay-btn {
            width: 100%;
            padding: 14px;
            background: #2ecc71; /* Matching the video's solid green Pay option */
            color: #0a140f;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-pay-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="toast-banner" class="toast-notification"></div>

    <nav class="navbar">
        <div class="logo">BOTANY POS</div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Site</a></li>
        </ul>
    </nav>

    <div class="pos-container">
        <div class="menu-panel-wrapper">
            <h2 style="text-align: left; margin-bottom: 20px; font-weight: 600;">Menu</h2>
            <div class="menu-selection-scroll">
                <div class="pos-grid" id="pos-grid"></div>
            </div>
        </div>

        <div class="ordered-items-sidebar">
            <div class="sidebar-title">Ordered Items</div>
            
            <div class="order-list-scroll" id="order-list">
                </div>
            
            <div class="calculation-footer-box">
                <div class="grand-total-label" id="total-display-label">Total: 0 PHP</div>
                
                <div class="payment-input-container">
                    <input type="number" id="cash-tendered-input" class="cash-text-input" placeholder="Enter the amount here">
                    <button class="action-pay-btn" onclick="executePaymentTransaction()">Pay!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="pos.js"></script>
</body>
</html>
