<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botany POS | Staff Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 25px;
            padding: 100px 5% 40px;
            height: 100vh;
            overflow: hidden; /* Prevents the main page from scrolling */
        }

        .menu-selection { 
            overflow-y: auto; 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        .menu-selection::-webkit-scrollbar { display: none; }

        .order-sidebar {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            height: calc(100vh - 140px);
        }

        .action-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .action-box label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim); }

        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }

        select, .settlement-input, #item-qty {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 8px;
            border-radius: 5px;
            flex-grow: 1;
        }

        /* Removes arrows from inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        .add-btn {
            background: #a67c52;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .order-list {
            flex-grow: 1;
            overflow-y: auto;
            margin: 15px 0;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .order-list::-webkit-scrollbar { display: none; }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .item-info { display: flex; align-items: center; gap: 10px; }
        .pos-item-img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
        .item-details { display: flex; flex-direction: column; }
        .item-qty { font-size: 0.8rem; color: var(--accent-green); }

        .settlement-box { margin-top: 15px; }
        .settlement-input { width: 100%; padding: 12px; margin-top: 10px; font-size: 1.1rem; }

        .pos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding-bottom: 50px;
        }

        .pos-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .pos-card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.1); }
        .pos-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-green);
            border: none;
            border-radius: 10px;
            color: var(--forest-bg);
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">BOTANY POS</div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Site</a></li>
        </ul>
    </nav>

    <div class="pos-container">
        <div class="menu-selection">
            <h2 style="margin-bottom:20px;">Our Selection</h2>
            <div class="pos-grid" id="pos-grid"></div>
        </div>

        <div class="order-sidebar">
            <div class="action-box">
                <label>Add Item</label>
                <div class="input-group">
                    <select id="item-select"></select>
                    <input type="number" id="item-qty" value="1" min="1" style="width: 60px;">
                    <button class="add-btn" onclick="addFromMenu()">ADD</button>
                </div>
            </div>

            <h3>My Order</h3>
            <div class="order-list" id="order-list"></div>
            
            <div class="totals-section">
                <div class="total-row"><span>Items Subtotal:</span> <span id="subtotal">0.00</span></div>
                <div class="total-row" style="font-weight:bold; font-size:1.2rem; color:white;">
                    <span>Total Amount:</span> <span id="total-amount">0.00</span>
                </div>
                
                <div class="settlement-box">
                    <label>Settlement</label>
                    <input type="number" id="cash-input" class="settlement-input" placeholder="Enter Cash Amount" oninput="calculateChange()">
                    <div class="total-row" style="margin-top:10px;">
                        <span>Change:</span> <span id="change-display">0.00 PHP</span>
                    </div>
                </div>
            </div>
            
            <button class="checkout-btn" id="confirm-pay-btn" onclick="processCheckout()" disabled>Confirm Payment</button>
        </div>
    </div>

    <script src="pos.js"></script>
</body>
</html>
